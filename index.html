<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayTube</title>
    <style>
        /* --- GENEL TASARIM VE DEĞİŞKENLER --- */
        :root {
            --bg-color: #0f0f0f;
            --surface-color: #212121;
            --hover-color: #3d3d3d;
            --text-primary: #f1f1f1;
            --text-secondary: #aaaaaa;
            --accent-color: #3ea6ff;
            --youtube-red: #ff0000;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Roboto', 'Segoe UI', Tahoma, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            overflow-x: hidden;
        }

        /* --- ÜST MENÜ (HEADER) VE LOGO --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 24px;
            background-color: var(--bg-color);
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        .logo-container {
            display: flex;
            align-items: center;
            cursor: pointer;
            gap: 5px;
        }
        .logo-svg {
            width: 32px;
            height: 32px;
        }
        .logo-text {
            font-size: 22px;
            font-weight: bold;
            color: var(--text-primary);
            letter-spacing: -1px;
        }
        
        /* Arama Kutusu */
        .search-box {
            display: flex;
            align-items: center;
            flex: 0 1 600px;
        }
        .search-input {
            width: 100%;
            padding: 10px 20px;
            border-radius: 20px 0 0 20px;
            border: 1px solid #303030;
            background: #121212;
            color: white;
            outline: none;
            font-size: 16px;
        }
        .search-input:focus {
            border: 1px solid #1c62b9;
        }
        .search-btn {
            padding: 10px 20px;
            border-radius: 0 20px 20px 0;
            border: 1px solid #303030;
            border-left: none;
            background: #222222;
            color: white;
            cursor: pointer;
        }
        .login-btn {
            background-color: transparent;
            color: var(--accent-color);
            border: 1px solid #303030;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* --- ÇEREZ POLİTİKASI (COOKIE BANNER) --- */
        #cookie-banner {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--surface-color);
            padding: 20px 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            z-index: 2000;
            border: 1px solid #333;
            text-align: center;
            width: 90%;
            max-width: 500px;
        }
        .cookie-buttons {
            display: flex;
            gap: 10px;
        }
        .btn-accept, .btn-info {
            padding: 10px 24px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            border: none;
        }
        .btn-accept {
            background-color: var(--text-primary);
            color: var(--bg-color);
        }
        .btn-info {
            background-color: transparent;
            color: var(--text-primary);
            border: 1px solid var(--text-primary);
        }

        /* --- ANA SAYFA (GRID) VE VİDEO KARTLARI --- */
        .container {
            padding: 24px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            row-gap: 40px;
        }
        .video-card {
            cursor: pointer;
            display: flex;
            flex-direction: column;
        }
        .thumbnail-wrapper {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            border-radius: 12px;
            overflow: hidden;
            background-color: #222;
        }
        .thumbnail {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: 0.2s;
        }
        .video-card:hover .thumbnail {
            transform: scale(1.05);
        }
        .video-info {
            display: flex;
            gap: 12px;
            margin-top: 12px;
        }
        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background-color: #555;
            object-fit: cover;
        }
        .title {
            font-size: 16px;
            font-weight: 500;
            color: var(--text-primary);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            margin-bottom: 4px;
            line-height: 1.4;
        }
        .channel-name, .views-date {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.3;
        }

        /* --- SONSUZ KAYDIRMA YÜKLEYİCİSİ --- */
        #loader {
            text-align: center;
            padding: 40px;
            color: var(--text-secondary);
            font-size: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* --- VİDEO İZLEME SAYFASI --- */
        #player-view {
            display: none;
            max-width: 1280px;
            margin: 0 auto;
            padding: 24px;
        }
        .iframe-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
        }
        .iframe-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }
        .player-title {
            font-size: 20px;
            font-weight: bold;
            margin: 15px 0;
        }
        .player-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .channel-block {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .btn-subscribe {
            background-color: var(--text-primary);
            color: var(--bg-color);
            border: none;
            padding: 10px 16px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            margin-left: 10px;
        }
        .action-buttons {
            display: flex;
            gap: 8px;
        }
        .btn-action {
            background-color: var(--surface-color);
            color: var(--text-primary);
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }
    </style>
</head>
<body>

    <!-- ÜST MENÜ & LOGO -->
    <header>
        <div class="logo-container" onclick="goHome()">
            <!-- SVG YouTube Tarzı Logo -->
            <svg class="logo-svg" viewBox="0 0 24 24" fill="#ff0000">
                <path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/>
            </svg>
            <div class="logo-text">PlayTube</div>
        </div>
        <div class="search-box">
            <input type="text" class="search-input" placeholder="Ara">
            <button class="search-btn">🔍</button>
        </div>
        <button class="login-btn" onclick="devAlert('Oturum Açma')">👤 Oturum Aç</button>
    </header>

    <!-- ÇEREZ POLİTİKASI -->
    <div id="cookie-banner">
        <p>Deneyiminizi geliştirmek ve size özel içerikler sunmak için çerezleri kullanıyoruz. İzlediğiniz videolara göre algoritma şekillenecektir.</p>
        <div class="cookie-buttons">
            <button class="btn-info" onclick="showCookieInfo()">Çerezler Hakkında</button>
            <button class="btn-accept" onclick="acceptCookies()">Kabul Et</button>
        </div>
    </div>

    <!-- ANA SAYFA (GRID) -->
    <main id="home-view" class="container">
        <div class="grid" id="video-grid">
            <!-- Videolar Javascript ile buraya eklenecek -->
        </div>
        <!-- Sonsuz Kaydırma İçin Yükleniyor İkonu -->
        <div id="loader">
            <div class="spinner"></div>
            <span>Daha fazla video yükleniyor...</span>
        </div>
    </main>

    <!-- VİDEO İZLEME SAYFASI -->
    <section id="player-view">
        <div class="iframe-container" id="player-container"></div>
        <div class="player-title" id="p-title"></div>
        <div class="player-actions">
            <div class="channel-block">
                <img src="" class="avatar" id="p-avatar">
                <div>
                    <div style="font-weight: bold; font-size: 16px;" id="p-channel"></div>
                    <div style="font-size: 12px; color: var(--text-secondary);" id="p-subs"></div>
                </div>
                <button class="btn-subscribe" onclick="devAlert('Abone Ol (Oturum Gerektirir)')">Abone Ol</button>
            </div>
            <div class="action-buttons">
                <button class="btn-action" onclick="devAlert('Beğeni (Oturum Gerektirir)')">👍 Beğen</button>
                <button class="btn-action" onclick="devAlert('Dislike (Oturum Gerektirir)')">👎</button>
                <button class="btn-action" onclick="alert('Bağlantı kopyalandı!')">↪ Paylaş</button>
            </div>
        </div>
    </section>

    <script>
        // GERÇEK VE GENİŞLETİLMİŞ VİDEO VERİTABANI
        const db = [
            { id: "dQw4w9WgXcQ", title: "Rick Astley - Never Gonna Give You Up (Official Music Video)", channel: "Rick Astley", views: "1.4 Mr", date: "14 yıl önce", category: "music" },
            { id: "Wq5W5B_iH_o", title: "ÇORUM FK 1-1 KOCAELİSPOR | TRENDYOL 1. LİG", channel: "beIN SPORTS Türkiye", views: "150 B", date: "3 ay önce", category: "football" },
            { id: "x4T_S6-hojw", title: "Minecraft Bedrock: How to Make Custom Addons", channel: "Bedrock Creator", views: "450 B", date: "1 yıl önce", category: "gaming" },
            { id: "g4Hbz2j-WlY", title: "Kodular App Development Tutorial for Beginners", channel: "Tech & Code", views: "85 B", date: "2 yıl önce", category: "tech" },
            { id: "9bZkp7q19f0", title: "PSY - GANGNAM STYLE(강남스타일) M/V", channel: "officialpsy", views: "5.1 Mr", date: "11 yıl önce", category: "music" },
            { id: "jNQXAC9IVRw", title: "Me at the zoo", channel: "jawed", views: "315 Mn", date: "19 yıl önce", category: "vlog" },
            { id: "bT_TWXqH6bY", title: "Champions League All Goals & Highlights", channel: "Football Daily", views: "2.1 Mn", date: "2 hafta önce", category: "football" },
            { id: "kJQP7kiw5Fk", title: "Luis Fonsi - Despacito ft. Daddy Yankee", channel: "Luis Fonsi", views: "8.4 Mr", date: "7 yıl önce", category: "music" },
            { id: "8_Rzao2bJ0k", title: "How to Install Custom ROM on ANY Android!", channel: "TechDroid", views: "1.1 Mn", date: "3 yıl önce", category: "tech" },
            { id: "UoxsXG1rWQM", title: "I Survived 100 Days in Hardcore Minecraft", channel: "GamerPro", views: "5.6 Mn", date: "1 yıl önce", category: "gaming" },
            { id: "V-_O7nl0Ii0", title: "Adele - Hello", channel: "Adele", views: "3.1 Mr", date: "8 yıl önce", category: "music" },
            { id: "-V13t1lCVSY", title: "Build a Full Website using HTML, CSS & JS", channel: "Web Dev Simplified", views: "900 B", date: "11 ay önce", category: "tech" },
            { id: "v=6Z4N94P_Nyk", title: "Crazy Football Skills & Goals", channel: "Soccer Highlights", views: "3.4 Mn", date: "4 ay önce", category: "football" },
            { id: "L_jWHffIx5E", title: "Smash Mouth - All Star (Official Music Video)", channel: "Smash Mouth", views: "980 Mn", date: "14 yıl önce", category: "music" }
        ];

        let videoQueue = []; // Algoritmaya göre sıralanmış videolar
        let loadedIndex = 0; // Kaç video yüklendi
        const BATCH_SIZE = 8; // Her kaydırmada kaç video yüklenecek

        window.onload = () => {
            checkCookies();
            resetAlgorithmAndLoad();
        };

        // --- ÇEREZ SİSTEMİ ---
        function checkCookies() {
            if(localStorage.getItem('cookiesAccepted') === 'true') {
                document.getElementById('cookie-banner').style.display = 'none';
            }
        }
        function acceptCookies() {
            localStorage.setItem('cookiesAccepted', 'true');
            document.getElementById('cookie-banner').style.display = 'none';
        }
        function showCookieInfo() {
            alert("Çerezler Hakkında:\n\nKabul ettiğinizde izlediğiniz videoların kategorisi (Müzik, Futbol, Kodlama vb.) tarayıcınıza anonim olarak kaydedilir. Sayfayı aşağı kaydırdıkça yüklenen tüm yeni videolar doğrudan sizin bu ilgi alanlarınıza göre sıralanarak karşınıza çıkar.");
        }

        // --- ALGORİTMA VE SONSUZ KAYDIRMA (INFINITE SCROLL) ---
        function resetAlgorithmAndLoad() {
            const grid = document.getElementById('video-grid');
            grid.innerHTML = ''; // Temizle
            loadedIndex = 0;
            
            let baseVideos = [...db];
            
            // Eğer çerez onaylıysa algoritmayı çalıştır
            if (localStorage.getItem('cookiesAccepted') === 'true') {
                const favoriteCategory = localStorage.getItem('favoriteCategory');
                if (favoriteCategory) {
                    baseVideos.sort((a, b) => {
                        if (a.category === favoriteCategory && b.category !== favoriteCategory) return -1;
                        if (a.category !== favoriteCategory && b.category === favoriteCategory) return 1;
                        return 0;
                    });
                }
            }

            // Daha fazla video varmış gibi hissettirmek için listeyi kopyalayarak çoğaltıyoruz
            videoQueue = [...baseVideos, ...baseVideos, ...baseVideos, ...baseVideos]; 
            
            loadMoreVideos();
        }

        function loadMoreVideos() {
            const grid = document.getElementById('video-grid');
            const end = loadedIndex + BATCH_SIZE;
            
            for(let i = loadedIndex; i < end; i++) {
                // Eğer listenin sonuna geldiysek başa sarıp sonsuz döngü yarat
                const vid = videoQueue[i % videoQueue.length];
                
                const card = document.createElement('div');
                card.className = 'video-card';
                // Hqdefault kullanıyoruz çünkü her videoda garantili çalışan ve kaliteli görünen kapak formatıdır
                const thumbUrl = `https://i.ytimg.com/vi/${vid.id}/hqdefault.jpg`;
                
                card.innerHTML = `
                    <div class="thumbnail-wrapper" onclick="playVideo('${vid.id}')">
                        <img src="${thumbUrl}" class="thumbnail" loading="lazy">
                    </div>
                    <div class="video-info">
                        <img src="https://ui-avatars.com/api/?name=${vid.channel}&background=random&color=fff" class="avatar">
                        <div>
                            <div class="title" onclick="playVideo('${vid.id}')">${vid.title}</div>
                            <div class="channel-name">${vid.channel}</div>
                            <div class="views-date">${vid.views} görüntüleme • ${vid.date}</div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            }
            loadedIndex += BATCH_SIZE;
        }

        // Sayfa en alta indiğinde yeni videoları yükle
        window.onscroll = function() {
            if (document.getElementById('home-view').style.display !== 'none') {
                if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 100) {
                    loadMoreVideos();
                }
            }
        };

        // --- SEYİRCİ (PLAYER) KONTROLLERİ ---
        function goHome() {
            document.getElementById('player-view').style.display = 'none';
            document.getElementById('home-view').style.display = 'block';
            document.getElementById('player-container').innerHTML = ''; // Videoyu sustur
            
            // Eğer çerezler açıksa ve yeni bir video izlendiyse ana sayfayı yeni algoritmaya göre tekrar diz
            resetAlgorithmAndLoad();
        }

        function playVideo(id) {
            const vid = db.find(v => v.id === id);
            if(!vid) return;

            // Algoritmayı Eğit
            if (localStorage.getItem('cookiesAccepted') === 'true') {
                localStorage.setItem('favoriteCategory', vid.category);
            }

            document.getElementById('home-view').style.display = 'none';
            
            document.getElementById('player-container').innerHTML = `
                <iframe src="https://www.youtube.com/embed/${id}?autoplay=1" allow="autoplay; encrypted-media; fullscreen"></iframe>
            `;
            document.getElementById('p-title').innerText = vid.title;
            document.getElementById('p-channel').innerText = vid.channel;
            document.getElementById('p-subs').innerText = "1.2 Mn abone";
            document.getElementById('p-avatar').src = `https://ui-avatars.com/api/?name=${vid.channel}&background=random&color=fff`;

            document.getElementById('player-view').style.display = 'block';
            window.scrollTo(0, 0);
        }

        function devAlert(feature) {
            alert(`🚧 YAPIM AŞAMASINDA 🚧\n\n'${feature}' özelliği kayıtlı kullanıcılar içindir. Şu an geliştirilmektedir.`);
        }
    </script>
</body>
</html>
