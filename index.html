<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>ShortsTube 3D Logo</title>
    <style>
        body {
            background-color: #0f0f0f;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: white;
            font-family: 'Segoe UI', Tahoma, sans-serif;
        }
        
        .logo-container {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        /* 3D SVG LOGO BÜYÜTÜLMÜŞ HALİ */
        .logo-svg {
            width: 150px; 
            height: 150px;
            filter: drop-shadow(0px 15px 15px rgba(255, 0, 80, 0.5)); /* Dış 3D Gölge */
            transition: transform 0.3s ease;
        }
        
        .logo-svg:hover {
            transform: scale(1.05); /* Üzerine gelince büyüme efekti */
        }

        .logo-text {
            font-size: 80px; 
            font-weight: 900; 
            letter-spacing: -3px;
            background: linear-gradient(180deg, #ffffff 30%, #aaaaaa 100%);
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
            text-shadow: 0px 10px 20px rgba(0,0,0,0.8);
        }
        
        .logo-text span {
            background: linear-gradient(180deg, #ff0050 0%, #aa0030 100%);
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>

    <div class="logo-container">
        <!-- SVG 3D LOGO KODU -->
        <svg class="logo-svg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <!-- Logo Arka Plan Gradyanı (Kırmızı/Pembe) -->
                <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" style="stop-color:#ff4081;stop-opacity:1" />
                    <stop offset="100%" style="stop-color:#ff0050;stop-opacity:1" />
                </linearGradient>
                
                <!-- 3D Işık Yansıması (Üstten Vuran Parlaklık) -->
                <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.6" />
                    <stop offset="40%" style="stop-color:#ffffff;stop-opacity:0" />
                </linearGradient>
                
                <!-- İç Gölge (3D Derinlik Hissi Veren Filtre) -->
                <filter id="innerShadow">
                    <feOffset dx="0" dy="5"/>
                    <feGaussianBlur stdDeviation="4" result="offset-blur"/>
                    <feComposite operator="out" in="SourceGraphic" in2="offset-blur" result="inverse"/>
                    <feFlood flood-color="black" flood-opacity="0.6" result="color"/>
                    <feComposite operator="in" in="color" in2="inverse" result="shadow"/>
                    <feComposite operator="over" in="shadow" in2="SourceGraphic"/>
                </filter>
            </defs>

            <!-- 1. Katman: Gölgeli ve Renkli Arka Plan Kutusu -->
            <rect width="100" height="100" rx="28" fill="url(#bgGrad)" filter="url(#innerShadow)" />
            
            <!-- 2. Katman: Cam/Işık Parlaması Efekti -->
            <rect width="100" height="100" rx="28" fill="url(#shine)" />
            
            <!-- 3. Katman: Shorts (S Harfi) İkonu -->
            <path d="M 38 25 C 20 25 20 50 38 50 C 56 50 56 75 38 75" fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round" />
            
            <!-- 4. Katman: 3D Play Tuşu İkonu -->
            <polygon points="65,38 65,62 82,50" fill="#ffffff" filter="url(#innerShadow)"/>
        </svg>

        <!-- LOGO YAZISI -->
        <div class="logo-text">Shorts<span>Tube</span></div>
    </div>

</body>
</html>
