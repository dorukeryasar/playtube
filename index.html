<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Play Tube</title>
    <style>
        /* --- PLAY TUBE ÖZEL TASARIM --- */
        :root {
            --bg-main: #0a0a0f;
            --bg-card: #15151e;
            --text-main: #ffffff;
            --text-muted: #8e8e9f;
            --accent: #E94057;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); overflow-x: hidden; }

        /* --- ÜST MENÜ & LOGO --- */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 30px; background-color: rgba(10, 10, 15, 0.95); 
            backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .brand { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .logo-text { font-size: 24px; font-weight: 800; letter-spacing: -0.5px; background: -webkit-linear-gradient(45deg, #F27121, #E94057, #8A2387); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .search-container { display: flex; flex: 0 1 500px; position: relative; }
        .search-bar { 
            width: 100%; padding: 12px 20px; border-radius: 30px; border: 1px solid #2a2a35; 
            background: #111119; color: white; font-size: 15px; outline: none; transition: 0.3s;
        }
        .search-bar:focus { border-color: var(--accent); box-shadow: 0 0 15px rgba(233, 64, 87, 0.2); }
        .search-btn { 
            position: absolute; right: 5px; top: 5px; bottom: 5px; padding: 0 20px;
            border-radius: 25px; border: none; background: -webkit-linear-gradient(45deg, #E94057, #8A2387);
            color: white; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        .search-btn:hover { opacity: 0.8; }

        /* --- VİDEO LİSTESİ (CANLI VERİ) --- */
        .container { padding: 30px; max-width: 1600px; margin: 0 auto; }
        .section-title { font-size: 20px; margin-bottom: 20px; font-weight: 600; color: #fff; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; row-gap: 40px; }
        .video-card { cursor: pointer; display: flex; flex-direction: column; transition: transform 0.2s; }
        .video-card:hover { transform: translateY(-5px); }
        .thumb-wrapper { position: relative; width: 100%; padding-bottom: 56.25%; border-radius: 16px; overflow: hidden; background: #222; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .thumbnail { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .duration-badge { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.8); padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: bold; }
        
        .info { display: flex; gap: 12px; margin-top: 15px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background-color: #333; object-fit: cover; }
        .title { font-size: 16px; font-weight: 600; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 6px; line-height: 1.4; color: #fff; }
        .channel { font-size: 14px; color: var(--text-muted); margin-bottom: 3px; font-weight: 500; }
        .stats { font-size: 13px; color: #666677; }

        /* --- VİDEO İZLEME OYNATICISI --- */
        #player-view { display: none; max-width: 1200px; margin: 0 auto; padding: 30px; }
        .player-wrapper { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 20px; overflow: hidden; background: #000; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #333; }
        .player-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        
        .vid-title { font-size: 22px; font-weight: bold; margin: 20px 0 10px 0; color: #fff; }
        .vid-bottom { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid #2a2a35; }
        .vid-channel { display: flex; align-items: center; gap: 15px; }
        .vid-channel img { width: 48px; height: 48px; border-radius: 50%; }

        /* --- YÜKLENİYOR (LOADING) --- */
        #loading { text-align: center; padding: 50px; display: none; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s infinite linear; margin: 0 auto 15px auto; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- ÜST MENÜ & YENİ LOGO -->
    <header>
        <div class="brand" onclick="loadTrending()">
            <!-- YEPYENİ PLAY TUBE LOGOSU (Gradient) -->
            <svg width="42" height="42" viewBox="0 0 100 100">
                <defs>
                    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#8A2387;stop-opacity:1" />
                        <stop offset="50%" style="stop-color:#E94057;stop-opacity:1" />
                        <stop offset="100%" style="stop-color:#F27121;stop-opacity:1" />
                    </linearGradient>
                </defs>
                <rect width="100" height="100" rx="28" fill="url(#grad)" />
                <polygon points="38,28 38,72 72,50" fill="#fff" />
            </svg>
            <div class="logo-text">Play Tube</div>
        </div>
        
        <div class="search-container">
            <input type="text" id="searchInput" class="search-bar" placeholder="YouTube'da gerçek zamanlı ara..." onkeypress="handleKeyPress(event)">
            <button class="search-btn" onclick="executeSearch()">Ara</button>
        </div>
    </header>

    <main class="container">
        <!-- VİDEO LİSTESİ -->
        <div id="home-view">
            <div class="section-title" id="page-title">🔥 Türkiye'de Şu An Trend Olanlar</div>
            
            <div id="loading">
                <div class="spinner"></div>
                <div style="color: var(--text-muted);">YouTube Sunucularından Canlı Veri Çekiliyor...</div>
            </div>

            <div class="grid" id="video-grid"></div>
        </div>

        <!-- OYNATICI SAYFASI -->
        <div id="player-view">
            <div class="player-wrapper" id="player-container"></div>
            <div class="vid-title" id="p-title"></div>
            <div class="vid-bottom">
                <div class="vid-channel">
                    <img src="" id="p-avatar">
                    <div>
                        <div style="font-weight: bold; font-size: 16px;" id="p-channel"></div>
                        <div style="font-size: 13px; color: var(--text-muted);">Play Tube Player</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // YOUTUBE VERİLERİNİ CANLI ÇEKEN AÇIK KAYNAK API KÖPRÜSÜ
        const API_BASE = "https://pipedapi.kavin.rocks"; 
        
        const grid = document.getElementById('video-grid');
        const loading = document.getElementById('loading');
        const pageTitle = document.getElementById('page-title');

        window.onload = () => {
            loadTrending();
        };

        // --- 1. YOUTUBE TRENDLERİ ÇEKME FONKSİYONU ---
        async function loadTrending() {
            hidePlayer();
            grid.innerHTML = '';
            pageTitle.innerText = "🔥 Türkiye'de Şu An Trend Olanlar";
            loading.style.display = "block";

            try {
                // Türkiye bölgesindeki gerçek YouTube trendlerini çeker
                const response = await fetch(`${API_BASE}/trending?region=TR`);
                const data = await response.json();
                
                loading.style.display = "none";
                renderVideos(data.filter(v => v.type === 'stream')); // Sadece videoları filtrele
            } catch (error) {
                loading.innerHTML = "<div style='color:red;'>⚠️ Sunucuya bağlanılamadı. Lütfen sayfayı yenile.</div>";
            }
        }

        // --- 2. YOUTUBE ARAMA FONKSİYONU ---
        async function executeSearch() {
            const query = document.getElementById('searchInput').value.trim();
            if(!query) return;

            hidePlayer();
            grid.innerHTML = '';
            pageTitle.innerText = `🔍 "${query}" için arama sonuçları`;
            loading.style.display = "block";

            try {
                // Aranılan kelimeyi YouTube API'sine gönderir
                const response = await fetch(`${API_BASE}/search?q=${encodeURIComponent(query)}&filter=videos`);
                const data = await response.json();
                
                loading.style.display = "none";
                renderVideos(data.items.filter(v => v.type === 'stream'));
            } catch (error) {
                loading.innerHTML = "<div style='color:red;'>⚠️ Arama yapılamadı. Tekrar deneyin.</div>";
            }
        }

        // Enter tuşu ile arama yapabilme
        function handleKeyPress(e) {
            if(e.key === 'Enter') executeSearch();
        }

        // --- 3. VERİLERİ EKRANA (KARTLARA) YAZDIRMA ---
        function renderVideos(videos) {
            grid.innerHTML = '';
            
            videos.forEach(vid => {
                // API'den gelen verileri alıyoruz
                const videoId = vid.url.replace('/watch?v=', '');
                // Kaliteli thumbnail formatı (Eğer API kendi thumbnailını verirse onu, yoksa standart YT linkini kullan)
                const thumbUrl = vid.thumbnail || `https://i.ytimg.com/vi/${videoId}/hqdefault.jpg`;
                const avatarUrl = vid.uploaderAvatar || `https://ui-avatars.com/api/?name=${vid.uploaderName}&background=222&color=fff`;
                
                // Görüntüleme sayısını formatla (Örn: 150000 -> 150 B)
                let viewsText = vid.views ? formatViews(vid.views) : 'Görüntüleme gizli';
                let duration = vid.duration > 0 ? formatTime(vid.duration) : 'Canlı';

                const card = document.createElement('div');
                card.className = 'video-card';
                card.onclick = () => playVideo(videoId, vid.title, vid.uploaderName, avatarUrl);
                
                card.innerHTML = `
                    <div class="thumb-wrapper">
                        <img src="${thumbUrl}" class="thumbnail" loading="lazy">
                        <div class="duration-badge">${duration}</div>
                    </div>
                    <div class="info">
                        <img src="${avatarUrl}" class="avatar" loading="lazy">
                        <div>
                            <div class="title">${vid.title}</div>
                            <div class="channel">${vid.uploaderName}</div>
                            <div class="stats">${viewsText} • ${vid.uploadedDate || 'Yakın zamanda'}</div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // --- 4. VİDEO OYNATICI (PLAYER) SİSTEMİ ---
        function playVideo(id, title, channel, avatarUrl) {
            document.getElementById('home-view').style.display = 'none';
            
            const playerContainer = document.getElementById('player-container');
            // Orijinal YouTube Iframe Embed Sistemi (Sorunsuz Oynatma)
            playerContainer.innerHTML = `<iframe src="https://www.youtube.com/embed/${id}?autoplay=1" allow="autoplay; encrypted-media; fullscreen"></iframe>`;
            
            document.getElementById('p-title').innerText = title;
            document.getElementById('p-channel').innerText = channel;
            document.getElementById('p-avatar').src = avatarUrl;
            
            document.getElementById('player-view').style.display = 'block';
            window.scrollTo(0, 0);
        }

        function hidePlayer() {
            document.getElementById('player-view').style.display = 'none';
            document.getElementById('home-view').style.display = 'block';
            document.getElementById('player-container').innerHTML = ''; // İframe'i kapatıp videoyu durdurur
        }

        // --- YARDIMCI ARAÇLAR ---
        // Görüntülenme sayısını kısaltır
        function formatViews(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + ' Mn';
            if (num >= 1000) return (num / 1000).toFixed(0) + ' B';
            return num;
        }

        // Saniye cinsinden gelen süreyi (Örn: 135) dakika:saniye (02:15) formatına çevirir
        function formatTime(seconds) {
            if(seconds < 0) return "0:00";
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            if(h > 0) return `${h}:${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }
    </script>
</body>
</html>
