<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube</title>
    <style>
        /* --- YOUTUBE ORİJİNAL RENK PALETİ --- */
        :root {
            --yt-bg: #0f0f0f;
            --yt-surface: #212121;
            --yt-hover: #3d3d3d;
            --yt-text: #f1f1f1;
            --yt-text-sec: #aaaaaa;
            --yt-red: #ff0000;
            --yt-border: #303030;
            --yt-search-bg: #121212;
            --yt-blue: #3ea6ff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Roboto', 'Segoe UI', Tahoma, sans-serif; }
        body { background-color: var(--yt-bg); color: var(--yt-text); overflow-x: hidden; }

        /* --- ÜST MENÜ (HEADER) --- */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 24px; background-color: var(--yt-bg); position: sticky; top: 0; z-index: 1000;
        }
        .logo-container { display: flex; align-items: center; gap: 5px; cursor: pointer; }
        .logo-svg { width: 30px; height: 30px; fill: var(--yt-red); }
        .logo-text { font-size: 20px; font-weight: bold; letter-spacing: -1px; font-family: 'Arial', sans-serif; }
        
        .search-box { display: flex; align-items: center; flex: 0 1 600px; margin: 0 40px; }
        .search-input { 
            width: 100%; padding: 10px 20px; border-radius: 40px 0 0 40px; 
            border: 1px solid var(--yt-border); background: var(--yt-search-bg); 
            color: white; outline: none; font-size: 16px; 
        }
        .search-input:focus { border: 1px solid #1c62b9; margin-left: 0; }
        .search-btn { 
            padding: 10px 24px; border-radius: 0 40px 40px 0; border: 1px solid var(--yt-border); 
            border-left: none; background: #222222; color: white; cursor: pointer; 
        }
        .login-btn { 
            background-color: transparent; color: var(--yt-blue); border: 1px solid var(--yt-border); 
            padding: 6px 15px; border-radius: 20px; cursor: pointer; font-weight: 500; font-size: 14px;
            display: flex; align-items: center; gap: 8px;
        }

        /* --- ÇEREZ POLİTİKASI --- */
        #cookie-banner {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            background-color: var(--yt-surface); padding: 20px 30px; border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center;
            gap: 15px; z-index: 2000; border: 1px solid #333; text-align: center; max-width: 500px; width: 90%;
        }
        .cookie-buttons { display: flex; gap: 10px; }
        .btn-accept, .btn-info { padding: 10px 24px; border-radius: 20px; cursor: pointer; font-weight: bold; border: none; font-size: 14px; }
        .btn-accept { background-color: var(--yt-blue); color: #000; }
        .btn-info { background-color: transparent; color: var(--yt-text); border: 1px solid var(--yt-text); }

        /* --- VİDEO KARTLARI (GRID) --- */
        .container { padding: 24px; max-width: 1800px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; row-gap: 40px; }
        .video-card { cursor: pointer; display: flex; flex-direction: column; background: transparent; border: none; }
        .thumbnail-wrapper { position: relative; width: 100%; padding-bottom: 56.25%; border-radius: 12px; overflow: hidden; background-color: #222; }
        .thumbnail { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transition: 0.2s; }
        .video-card:hover .thumbnail { border-radius: 0; }
        .video-info { display: flex; gap: 12px; margin-top: 12px; }
        .avatar { width: 36px; height: 36px; border-radius: 50%; background-color: #555; object-fit: cover; cursor: pointer; }
        .title { font-size: 16px; font-weight: 500; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 4px; line-height: 1.4; }
        .channel-name { font-size: 14px; color: var(--yt-text-sec); cursor: pointer; margin-bottom: 2px; }
        .channel-name:hover { color: var(--yt-text); }
        .views-date { font-size: 14px; color: var(--yt-text-sec); }
        
        #loader { text-align: center; padding: 40px; color: var(--yt-text-sec); font-size: 16px; font-weight: 500; }

        /* --- VİDEO İZLEME SAYFASI --- */
        #player-view { display: none; max-width: 1280px; margin: 0 auto; padding: 24px; }
        .iframe-container { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 12px; overflow: hidden; background: #000; }
        .iframe-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .player-title { font-size: 20px; font-weight: bold; margin: 15px 0; }
        .player-actions { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px; }
        .channel-block { display: flex; align-items: center; gap: 12px; }
        .btn-subscribe { background-color: var(--yt-text); color: var(--yt-bg); border: none; padding: 10px 16px; border-radius: 20px; font-weight: bold; cursor: pointer; margin-left: 10px; }
        .action-buttons { display: flex; gap: 8px; }
        .btn-action { background-color: var(--yt-surface); color: var(--yt-text); border: none; padding: 8px 16px; border-radius: 20px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 6px; }
        .btn-action:hover { background-color: var(--yt-hover); }

        /* --- KANAL SAYFASI --- */
        #channel-view { display: none; }
        .channel-banner { width: 100%; height: 160px; background: #333; object-fit: cover; }
        .channel-header { display: flex; align-items: center; padding: 24px; gap: 20px; max-width: 1280px; margin: 0 auto; }
        .channel-avatar-large { width: 128px; height: 128px; border-radius: 50%; }
        .channel-info h1 { font-size: 24px; margin-bottom: 5px; }
        .channel-stats { color: var(--yt-text-sec); margin-bottom: 15px; font-size: 14px; }
        .channel-tabs { display: flex; gap: 30px; border-bottom: 1px solid var(--yt-border); max-width: 1280px; margin: 0 auto; padding: 0 24px; }
        .tab { padding: 15px 0; cursor: pointer; color: var(--yt-text-sec); font-weight: 500; position: relative; }
        .tab.active { color: var(--yt-text); }
        .tab.active::after { content: ''; position: absolute; bottom: -1px; left: 0; width: 100%; height: 3px; background-color: var(--yt-text); }
        .channel-content { max-width: 1280px; margin: 24px auto; padding: 0 24px; }
        .empty-state { text-align: center; color: var(--yt-text-sec); padding: 50px; font-size: 16px; }
    </style>
</head>
<body>

    <!-- ÜST MENÜ & YOUTUBE LOGO -->
    <header>
        <div class="logo-container" onclick="goHome()">
            <!-- Orijinal YouTube SVG Logosu -->
            <svg class="logo-svg" viewBox="0 0 24 24"><path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/></svg>
            <div class="logo-text">YouTube</div>
        </div>
        <div class="search-box">
            <input type="text" class="search-input" placeholder="Ara">
            <button class="search-btn">🔍</button>
        </div>
        <button class="login-btn" onclick="devAlert('Oturum Açma')">👤 Oturum Aç</button>
    </header>

    <!-- ÇEREZ POLİTİKASI -->
    <div id="cookie-banner">
        <p>Deneyiminizi geliştirmek ve algoritmayı size özel uyarlamak için çerezleri kullanıyoruz.</p>
        <div class="cookie-buttons">
            <button class="btn-info" onclick="showCookieInfo()">Çerezler Hakkında</button>
            <button class="btn-accept" onclick="acceptCookies()">Kabul Et</button>
        </div>
    </div>

    <!-- ANA SAYFA (GRID) -->
    <main id="home-view" class="container">
        <div class="grid" id="video-grid"></div>
        <div id="loader">Videolar yükleniyor...</div>
    </main>

    <!-- VİDEO İZLEME SAYFASI -->
    <section id="player-view">
        <div class="iframe-container" id="player-container"></div>
        <div class="player-title" id="p-title"></div>
        <div class="player-actions">
            <div class="channel-block">
                <img src="" class="avatar" id="p-avatar" onclick="openChannelFromPlayer()">
                <div style="cursor:pointer;" onclick="openChannelFromPlayer()">
                    <div style="font-weight: bold; font-size: 16px;" id="p-channel"></div>
                    <div style="font-size: 12px; color: var(--yt-text-sec);">1.2 Mn abone</div>
                </div>
                <button class="btn-subscribe" onclick="devAlert('Abone Olma')">Abone Ol</button>
            </div>
            <div class="action-buttons">
                <button class="btn-action" onclick="devAlert('Beğeni Sistemi')">👍 12 B</button>
                <button class="btn-action" onclick="devAlert('Dislike Sistemi')">👎</button>
                <button class="btn-action" onclick="shareVideo()">↪ Paylaş</button>
            </div>
        </div>
    </section>

    <!-- KANAL SAYFASI -->
    <section id="channel-view">
        <div class="channel-banner"></div>
        <div class="channel-header">
            <img src="" class="channel-avatar-large" id="c-avatar">
            <div class="channel-info">
                <h1 id="c-name">Kanal Adı</h1>
                <div class="channel-stats" id="c-handle">@kullaniciadi • 1.2 Mn abone • 45 Video</div>
                <button class="btn-subscribe" onclick="devAlert('Abone Olma')">Abone Ol</button>
            </div>
        </div>
        <div class="channel-tabs">
            <div class="tab active" onclick="switchTab('videos', this)">Videolar</div>
            <div class="tab" onclick="switchTab('shorts', this)">Shorts</div>
            <div class="tab" onclick="switchTab('community', this)">Topluluk</div>
        </div>
        <div class="channel-content" id="channel-content-area"></div>
    </section>

    <script>
        // GERÇEK YOUTUBE VİDEOLARI
        const db = [
            { id: "Wq5W5B_iH_o", title: "ÇORUM FK 1-1 KOCAELİSPOR | TRENDYOL 1. LİG", channel: "beIN SPORTS Türkiye", views: "150 B", date: "3 ay önce", category: "football" },
            { id: "x-X9_yHiv8A", title: "Real Madrid vs Barcelona 3-2 Highlights", channel: "LaLiga", views: "4.2 Mn", date: "1 ay önce", category: "football" },
            { id: "g4Hbz2j-WlY", title: "Kodular App Development Tutorial for Beginners", channel: "Tech & Code", views: "85 B", date: "2 yıl önce", category: "tech" },
            { id: "x4T_S6-hojw", title: "Minecraft Bedrock: How to Make Custom Addons", channel: "Bedrock Creator", views: "450 B", date: "1 yıl önce", category: "gaming" },
            { id: "dQw4w9WgXcQ", title: "Rick Astley - Never Gonna Give You Up", channel: "Rick Astley", views: "1.4 Mr", date: "14 yıl önce", category: "music" },
            { id: "8_Rzao2bJ0k", title: "How to Install Custom ROM on ANY Android!", channel: "TechDroid", views: "1.1 Mn", date: "3 yıl önce", category: "tech" },
            { id: "qJWEEmFGuX8", title: "GTA 5 RP - En Komik Anlar", channel: "Gaming TR", views: "1.2 Mn", date: "2 ay önce", category: "gaming" },
            { id: "V-_O7nl0Ii0", title: "Adele - Hello", channel: "Adele", views: "3.1 Mr", date: "8 yıl önce", category: "music" },
            { id: "jNQXAC9IVRw", title: "Me at the zoo", channel: "jawed", views: "315 Mn", date: "19 yıl önce", category: "vlog" },
            { id: "-V13t1lCVSY", title: "Build a Full Website using HTML, CSS & JS", channel: "Web Dev Simplified", views: "900 B", date: "11 ay önce", category: "tech" }
        ];

        let videoQueue = [];
        let loadedIndex = 0;
        const BATCH_SIZE = 8;
        let currentChannelObj = null;

        window.onload = () => {
            checkCookies();
            resetAlgorithmAndLoad();
        };

        function checkCookies() {
            if(localStorage.getItem('cookiesAccepted') === 'true') {
                document.getElementById('cookie-banner').style.display = 'none';
            }
        }
        function acceptCookies() {
            localStorage.setItem('cookiesAccepted', 'true');
            document.getElementById('cookie-banner').style.display = 'none';
        }
        function showCookieInfo() {
            alert("Çerezler Hakkında:\n\nİzleme geçmişiniz sadece bu tarayıcıda tutulur. Ana sayfa algoritması bu sayede tamamen sizin zevkinize (örneğin Futbol veya Müzik) göre şekillenir.");
        }

        function resetAlgorithmAndLoad() {
            document.getElementById('video-grid').innerHTML = ''; 
            loadedIndex = 0;
            let baseVideos = [...db];
            
            if (localStorage.getItem('cookiesAccepted') === 'true') {
                const favoriteCategory = localStorage.getItem('favoriteCategory');
                if (favoriteCategory) {
                    baseVideos.sort((a, b) => {
                        if (a.category === favoriteCategory && b.category !== favoriteCategory) return -1;
                        if (a.category !== favoriteCategory && b.category === favoriteCategory) return 1;
                        return Math.random() - 0.5;
                    });
                } else {
                    baseVideos.sort(() => Math.random() - 0.5);
                }
            } else {
                baseVideos.sort(() => Math.random() - 0.5);
            }

            videoQueue = [...baseVideos, ...baseVideos, ...baseVideos, ...baseVideos, ...baseVideos]; 
            loadMoreVideos();
        }

        function loadMoreVideos() {
            const grid = document.getElementById('video-grid');
            const end = loadedIndex + BATCH_SIZE;
            
            for(let i = loadedIndex; i < end; i++) {
                const vid = videoQueue[i % videoQueue.length];
                const card = document.createElement('div');
                card.className = 'video-card';
                const thumbUrl = `https://i.ytimg.com/vi/${vid.id}/hqdefault.jpg`;
                
                card.innerHTML = `
                    <div class="thumbnail-wrapper" onclick="playVideo('${vid.id}')">
                        <img src="${thumbUrl}" class="thumbnail" loading="lazy">
                    </div>
                    <div class="video-info">
                        <img src="https://ui-avatars.com/api/?name=${vid.channel}&background=random&color=fff" class="avatar" onclick="openChannel('${vid.channel}')">
                        <div>
                            <div class="title" onclick="playVideo('${vid.id}')">${vid.title}</div>
                            <div class="channel-name" onclick="openChannel('${vid.channel}')">${vid.channel}</div>
                            <div class="views-date">${vid.views} görüntüleme • ${vid.date}</div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            }
            loadedIndex += BATCH_SIZE;
        }

        window.onscroll = function() {
            if (document.getElementById('home-view').style.display !== 'none') {
                if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 150) {
                    loadMoreVideos();
                }
            }
        };

        function hideAllViews() {
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('player-view').style.display = 'none';
            document.getElementById('channel-view').style.display = 'none';
            document.getElementById('player-container').innerHTML = ''; 
        }

        function goHome() {
            hideAllViews();
            resetAlgorithmAndLoad();
            document.getElementById('home-view').style.display = 'block';
            window.scrollTo(0, 0);
        }

        function playVideo(id) {
            const vid = db.find(v => v.id === id);
            if(!vid) return;

            if (localStorage.getItem('cookiesAccepted') === 'true') {
                localStorage.setItem('favoriteCategory', vid.category);
            }

            hideAllViews();
            currentChannelObj = vid;

            document.getElementById('player-container').innerHTML = `
                <iframe src="https://www.youtube.com/embed/${id}?autoplay=1" allow="autoplay; encrypted-media; fullscreen"></iframe>
            `;
            document.getElementById('p-title').innerText = vid.title;
            document.getElementById('p-channel').innerText = vid.channel;
            document.getElementById('p-avatar').src = `https://ui-avatars.com/api/?name=${vid.channel}&background=random&color=fff`;

            document.getElementById('player-view').style.display = 'block';
            window.scrollTo(0, 0);
        }

        function openChannelFromPlayer() {
            if(currentChannelObj) openChannel(currentChannelObj.channel);
        }

        function openChannel(channelName) {
            hideAllViews();
            
            document.getElementById('c-name').innerText = channelName;
            document.getElementById('c-handle').innerText = `@${channelName.replace(/\s+/g, '').toLowerCase()} • 1.2 Mn abone`;
            document.getElementById('c-avatar').src = `https://ui-avatars.com/api/?name=${channelName}&background=random&color=fff`;

            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector('.tab').classList.add('active');
            
            loadChannelVideos(db.filter(v => v.channel === channelName));

            document.getElementById('channel-view').style.display = 'block';
            window.scrollTo(0, 0);
        }

        function switchTab(tabName, element) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            element.classList.add('active');

            const contentArea = document.getElementById('channel-content-area');
            if (tabName === 'videos') {
                const channelName = document.getElementById('c-name').innerText;
                loadChannelVideos(db.filter(v => v.channel === channelName));
            } 
            else if (tabName === 'shorts') {
                contentArea.innerHTML = `<div class="empty-state">Bu kanalda henüz Shorts videosu bulunmuyor.</div>`;
            } 
            else if (tabName === 'community') {
                contentArea.innerHTML = `<div class="empty-state">Topluluk gönderileri görüntülenemiyor.</div>`;
            }
        }

        function loadChannelVideos(videos) {
            const contentArea = document.getElementById('channel-content-area');
            if(videos.length === 0) {
                contentArea.innerHTML = `<div class="empty-state">Bu kanalda video bulunamadı.</div>`;
                return;
            }

            let html = `<div class="grid" style="padding:0;">`;
            videos.forEach(vid => {
                html += `
                    <div class="video-card" onclick="playVideo('${vid.id}')">
                        <div class="thumbnail-wrapper"><img src="https://i.ytimg.com/vi/${vid.id}/hqdefault.jpg" class="thumbnail"></div>
                        <div class="video-info">
                            <div>
                                <div class="title">${vid.title}</div>
                                <div class="views-date">${vid.views} • ${vid.date}</div>
                            </div>
                        </div>
                    </div>`;
            });
            html += `</div>`;
            contentArea.innerHTML = html;
        }

        function shareVideo() {
            navigator.clipboard.writeText("https://youtube.com/watch?v=" + currentChannelObj.id).then(() => {
                alert("✅ Video bağlantısı kopyalandı!");
            }).catch(err => {
                alert("Kopyalama başarısız oldu.");
            });
        }

        function devAlert(feature) {
            alert(`🚧 YAPIM AŞAMASINDA 🚧\n\n'${feature}' özelliği Google Oturum Açma gerektirir.`);
        }
    </script>
</body>
</html>
