<svg viewBox="0 0 500 120" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Logo Arka Plan Gradyanı -->
        <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#ff4081;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#ff0050;stop-opacity:1" />
        </linearGradient>
        
        <!-- 3D Işık Yansıması (Cam Efekti) -->
        <linearGradient id="shine" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.6" />
            <stop offset="40%" style="stop-color:#ffffff;stop-opacity:0" />
        </linearGradient>
        
        <!-- Logo İç Gölge (3D Derinlik) -->
        <filter id="innerShadow">
            <feOffset dx="0" dy="5"/>
            <feGaussianBlur stdDeviation="4" result="offset-blur"/>
            <feComposite operator="out" in="SourceGraphic" in2="offset-blur" result="inverse"/>
            <feFlood flood-color="black" flood-opacity="0.6" result="color"/>
            <feComposite operator="in" in="color" in2="inverse" result="shadow"/>
            <feComposite operator="over" in="shadow" in2="SourceGraphic"/>
        </filter>

        <!-- Yazı İçin 3D Gölge ve Işıltı Efekti -->
        <filter id="text3D" x="-10%" y="-20%" width="130%" height="150%">
            <!-- Ana siyah gölge -->
            <feDropShadow dx="0" dy="8" stdDeviation="5" flood-color="#000000" flood-opacity="0.7"/>
            <!-- Kırmızımsı alt ışıltı (Pop efekti) -->
            <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#ff0050" flood-opacity="0.4"/>
        </filter>

        <!-- Beyaz/Gümüş Yazı Gradyanı -->
        <linearGradient id="textWhite" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#ffffff"/>
            <stop offset="100%" stop-color="#b3b3b3"/>
        </linearGradient>

        <!-- Kırmızı Yazı Gradyanı -->
        <linearGradient id="textRed" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#ff0050"/>
            <stop offset="100%" stop-color="#8a0025"/>
        </linearGradient>
    </defs>

    <!-- 1. KISIM: 3D LOGO İKONU -->
    <g transform="translate(10, 10)">
        <rect width="100" height="100" rx="28" fill="url(#bgGrad)" filter="url(#innerShadow)" />
        <rect width="100" height="100" rx="28" fill="url(#shine)" />
        <path d="M 38 25 C 20 25 20 50 38 50 C 56 50 56 75 38 75" fill="none" stroke="#ffffff" stroke-width="12" stroke-linecap="round" />
        <polygon points="65,38 65,62 82,50" fill="#ffffff" filter="url(#innerShadow)"/>
    </g>

    <!-- 2. KISIM: 3D YAZI (ShortsTube) -->
    <text x="130" y="85" font-family="'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-size="75" font-weight="900" letter-spacing="-3" filter="url(#text3D)">
        <tspan fill="url(#textWhite)">Shorts</tspan><tspan fill="url(#textRed)">Tube</tspan>
    </text>
</svg>
